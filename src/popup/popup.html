<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Repo Stats Monitor</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-hero">
        <div>
          <p class="eyebrow">Quick Summary</p>
          <h1>GitHub Repo Stats Monitor</h1>
          <p id="last-updated" class="muted">Last updated: —</p>
        </div>
      </header>

      <section id="update-card" class="update-card" aria-labelledby="update-title" hidden>
        <h2 id="update-title">Update available</h2>
        <p id="update-body"></p>
        <button id="view-latest-version" type="button">View latest version</button>
      </section>

      <section class="status-panel" aria-label="Saved settings summary">
        <div class="status-copy">
          <p class="status-title">Last Checked</p>
          <p id="popup-status" class="muted popup-status" role="status" aria-live="polite"></p>
          <button id="refresh-stats" class="popup-refresh" type="button">Refresh</button>
        </div>
        <div class="settings-summary">
          <p id="repository-count">Repositories monitored: —</p>
          <p id="token-status">Token saved: —</p>
        </div>
      </section>

      <section class="metric-grid" aria-label="Repository statistics summary">
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="M16 20v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><circle cx="9.5" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M17 11a3 3 0 0 0 0-6M21 20v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          </span>
          <span class="metric-body"><span>Account Followers</span><strong id="account-followers">—</strong></span>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M13.7 21a2 2 0 0 1-3.4 0" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          </span>
          <span class="metric-body"><span>Repo Watchers</span><strong id="total-watchers">—</strong></span>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
          </span>
          <span class="metric-body"><span class="metric-label">Views</span><span class="metric-period">(last 14 days)</span><strong id="total-views">—</strong></span>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></path></svg>
          </span>
          <span class="metric-body"><span>Stars</span><strong id="total-stars">—</strong></span>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="M7 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM21 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM7 19a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM5 7v10M19 7v1a4 4 0 0 1-4 4H9a4 4 0 0 0-4 4v1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          </span>
          <span class="metric-body"><span>Forks</span><strong id="total-forks">—</strong></span>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" focusable="false"><path d="M12 3v11m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          </span>
          <span class="metric-body"><span class="metric-label">Clones</span><span class="metric-period">(last 14 days)</span><strong id="total-clones">—</strong></span>
        </div>
      </section>

      <div class="actions">
        <button id="open-dashboard" type="button">Open Dashboard</button>
        <button id="open-settings" class="secondary" type="button">Settings</button>
        <div class="utility-actions">
          <button id="close-popup" class="popup-close" type="button">Close</button>
        </div>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Repo Stats Monitor</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-hero">
        <div>
          <p class="eyebrow">Quick Summary</p>
          <h1>GitHub Repo Stats Monitor</h1>
          <p id="last-updated" class="muted">Last updated: —</p>
        </div>
        <button id="refresh-stats" class="popup-refresh" type="button">Refresh</button>
      </header>

      <section class="status-panel" aria-label="Saved settings summary">
        <div class="status-copy">
          <p class="status-title">Update on demand</p>
          <p id="popup-status" class="muted popup-status" role="status" aria-live="polite"></p>
        </div>
        <div class="settings-summary">
          <p id="repository-count">Repositories configured: —</p>
          <p id="token-status">Token saved: —</p>
        </div>
      </section>

      <section class="metric-grid" aria-label="Repository statistics summary">
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M2.25 12s3.5-6.25 9.75-6.25S21.75 12 21.75 12 18.25 18.25 12 18.25 2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="2.75"/></svg>
          </span>
          <span>Views, last 14 days</span>
          <strong id="total-views">—</strong>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="m12 2.75 2.85 5.78 6.38.93-4.61 4.49 1.09 6.35L12 17.3l-5.71 3 1.09-6.35-4.61-4.49 6.38-.93L12 2.75Z"/></svg>
          </span>
          <span>Stars</span>
          <strong id="total-stars">—</strong>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M7 5.25a2.25 2.25 0 1 1-1.5 4.18v5.14A2.25 2.25 0 1 1 4 14.57V9.43A2.25 2.25 0 0 1 7 5.25Zm10 0a2.25 2.25 0 1 1-1.5 4.18v1.07A4.5 4.5 0 0 1 11 15h-1"/><path d="m12.25 12.75-2.5 2.25 2.5 2.25"/></svg>
          </span>
          <span>Forks</span>
          <strong id="total-forks">—</strong>
        </div>
        <div class="metric">
          <span class="metric-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M12 3.75v10.5"/><path d="m7.75 10 4.25 4.25L16.25 10"/><path d="M5 17.75h14v2.5H5z"/></svg>
          </span>
          <span>Clones, last 14 days</span>
          <strong id="total-clones">—</strong>
        </div>
      </section>

      <div class="actions">
        <button id="open-dashboard" type="button">Open Dashboard</button>
        <button id="open-settings" class="secondary" type="button">Settings</button>
        <div class="utility-actions">
          <button id="close-popup" class="popup-close" type="button">Close</button>
        </div>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>

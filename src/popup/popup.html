<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Repo Stats Monitor</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <h1>GitHub Repo Stats Monitor</h1>
        <p id="last-updated" class="muted">Last updated: —</p>
        <p id="popup-status" class="muted popup-status" role="status" aria-live="polite"></p>
        <button id="refresh-stats" class="popup-refresh" type="button">Refresh</button>
      </header>

      <section class="card settings-summary" aria-label="Saved settings summary">
        <p id="repository-count">Repositories configured: —</p>
        <p id="token-status">Token saved: —</p>
      </section>

      <section class="metric-grid" aria-label="Repository statistics summary">
        <div class="metric"><span>Stars</span><strong id="total-stars">—</strong></div>
        <div class="metric"><span>Real watchers</span><strong id="total-subscribers">—</strong></div>
        <div class="metric"><span>Forks</span><strong id="total-forks">—</strong></div>
        <div class="metric"><span>Views, last 14 days</span><strong id="total-views">—</strong></div>
        <div class="metric"><span>Unique visitors, last 14 days</span><strong id="total-unique-visitors">—</strong></div>
      </section>

      <div class="actions">
        <button id="open-dashboard" type="button">Open Dashboard</button>
        <button id="open-settings" class="secondary" type="button">Settings</button>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
